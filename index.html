<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>라면 조리 마스터 - 가치있는미래교육연구소</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&display=swap');
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; height: 100vh; overflow: hidden; }
        .timer-display { font-variant-numeric: tabular-nums; text-shadow: 2px 2px 4px rgba(0,0,0,0.1); }
        .step-card { transition: all 0.3s ease; }
        .active-step { border-left: 5px solid #ef4444; background-color: #fef2f2; transform: scale(1.02); }
    </style>
</head>
<body class="flex flex-col">

    <!-- Header -->
    <header class="bg-red-600 text-white p-4 shadow-lg flex justify-between items-center shrink-0">
        <div>
            <h1 class="text-xl md:text-2xl font-bold flex items-center gap-2">
                <span>🍜</span> 라면 조리 마스터 (Optimal Recipe)
            </h1>
        </div>
        <div class="text-right leading-tight">
            <p class="text-xs opacity-90">개발자: 가치있는미래교육연구소</p>
            <p class="text-sm font-bold">대표 김병찬</p>
        </div>
    </header>

    <main class="flex-1 flex flex-col md:flex-row overflow-hidden">
        <!-- Left: Selection Panel -->
        <aside class="w-full md:w-80 bg-white shadow-xl p-6 overflow-y-auto shrink-0 border-r border-gray-200">
            <h2 class="text-lg font-bold mb-4 flex items-center gap-2 border-b pb-2">
                ⚙️ 조리 설정
            </h2>
            
            <!-- Language Selection -->
            <div class="mb-5">
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">Language / 언어</label>
                <select id="lang-select" class="w-full p-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none transition">
                    <option value="ko-KR">한국어 (Korean)</option>
                    <option value="en-US">English (영어)</option>
                    <option value="zh-CN">简体中文 (중국어)</option>
                    <option value="ja-JP">日本語 (일본어)</option>
                    <option value="es-ES">Español (스페인어)</option>
                    <option value="de-DE">Deutsch (독일어)</option>
                    <option value="vi-VN">Tiếng Việt (베트남어)</option>
                </select>
            </div>

            <!-- Ramen Selector -->
            <div class="mb-5">
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">라면 종류 선택</label>
                <select id="ramen-select" class="w-full p-2 bg-gray-50 border border-gray-300 rounded-lg focus:ring-2 focus:ring-red-500 outline-none transition">
                    <option value="shin">신라면 (Shin Ramyun)</option>
                    <option value="neoguri">너구리 (Neoguri)</option>
                    <option value="chapaghetti">짜파게티 (Chapaghetti)</option>
                    <option value="jjawang">짜왕 (Jjawang)</option>
                    <option value="anseong">안성탕면 (Anseongtangmyun)</option>
                    <option value="buldak">불닭볶음면 (Buldak)</option>
                    <option value="samyang">삼양라면 (Samyang)</option>
                    <option value="jin">진라면 (Jin Ramen)</option>
                    <option value="bibim">비빔면 (Bibim Men)</option>
                    <option value="wang">왕뚜껑 (Wang Ttukdeong)</option>
                </select>
                <div id="ramen-info" class="mt-2 text-xs text-blue-600 font-medium p-2 bg-blue-50 rounded">물 550ml, 4분 30초 권장</div>
            </div>

            <!-- Heat Source -->
            <div class="mb-5">
                <label class="block text-xs font-bold text-gray-500 uppercase mb-1">열원 (화력) 구분</label>
                <div class="grid grid-cols-2 gap-2">
                    <label class="cursor-pointer">
                        <input type="radio" name="stove" value="gas" checked class="hidden peer">
                        <div class="p-2 text-center border rounded-lg peer-checked:bg-red-50 peer-checked:border-red-500 peer-checked:text-red-700 hover:bg-gray-50 transition">가스레인지</div>
                    </label>
                    <label class="cursor-pointer">
                        <input type="radio" name="stove" value="induction" class="hidden peer">
                        <div class="p-2 text-center border rounded-lg peer-checked:bg-red-50 peer-checked:border-red-500 peer-checked:text-red-700 hover:bg-gray-50 transition">인덕션</div>
                    </label>
                </div>
            </div>

            <!-- Toppings -->
            <div class="mb-6 border-t pt-4">
                <label class="block text-xs font-bold text-gray-500 uppercase mb-2">추가 토핑 선택</label>
                <div class="space-y-2">
                    <label class="flex items-center p-2 bg-gray-50 rounded-lg cursor-pointer hover:bg-gray-100">
                        <input type="checkbox" id="top-ricecake" class="w-4 h-4 text-red-600 rounded">
                        <span class="ml-3 text-sm">떡국떡 (+30초)</span>
                    </label>
                    <label class="flex items-center p-2 bg-gray-50 rounded-lg cursor-pointer hover:bg-gray-100">
                        <input type="checkbox" id="top-onion" class="w-4 h-4 text-red-600 rounded">
                        <span class="ml-3 text-sm">대파 (마무리)</span>
                    </label>
                    <label class="flex items-center p-2 bg-gray-50 rounded-lg cursor-pointer hover:bg-gray-100">
                        <input type="checkbox" id="top-cheese" class="w-4 h-4 text-red-600 rounded">
                        <span class="ml-3 text-sm">치즈 (마무리)</span>
                    </label>
                    <div class="p-2 bg-gray-50 rounded-lg">
                        <div class="flex items-center mb-2">
                            <input type="checkbox" id="top-egg" class="w-4 h-4 text-red-600 rounded">
                            <span class="ml-3 text-sm font-bold">계란 추가</span>
                        </div>
                        <select id="egg-style" class="w-full p-2 text-xs border rounded bg-white disabled:opacity-50 transition" disabled>
                            <option value="soft">반숙 (부드러운 맛)</option>
                            <option value="hard">완숙 (담백한 맛)</option>
                        </select>
                    </div>
                </div>
            </div>

            <button id="init-btn" class="w-full bg-red-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-red-700 transition transform active:scale-95 shadow-lg">
                레시피 적용하기
            </button>
        </aside>

        <!-- Right: Timer & Status Panel -->
        <section id="timer-display-area" class="flex-1 p-6 flex flex-col gap-6 overflow-hidden relative">
            
            <!-- Step List View -->
            <div id="step-container" class="flex flex-col gap-3 overflow-y-auto flex-1 pr-2">
                <div id="idle-msg" class="h-full flex flex-col justify-center items-center text-gray-400">
                    <div class="text-7xl mb-4">🍲</div>
                    <p class="text-xl font-bold text-gray-600">라면 마스터 조리 시작</p>
                    <p class="text-sm mt-2">왼쪽에서 옵션을 선택하고 버튼을 눌러주세요.</p>
                </div>
            </div>

            <!-- Floating Control Bar -->
            <div id="control-bar" class="hidden shrink-0 bg-white p-6 rounded-2xl shadow-2xl border border-gray-100 flex flex-col md:flex-row items-center justify-between gap-6">
                <div class="text-center md:text-left">
                    <div id="current-step-label" class="text-xs font-bold text-red-600 mb-1 uppercase tracking-wider">Current Stage</div>
                    <div id="timer-val" class="text-6xl font-mono font-bold timer-display tracking-tighter text-gray-800">00:00</div>
                </div>

                <div class="flex gap-4 w-full md:w-auto">
                    <button id="start-btn" class="flex-1 md:w-44 bg-green-600 text-white py-4 rounded-xl font-bold text-xl hover:bg-green-700 shadow-lg flex items-center justify-center gap-2 transition active:scale-95">
                        ▶ 조리 시작
                    </button>
                    <button id="next-btn" class="flex-1 md:w-44 bg-blue-600 text-white py-4 rounded-xl font-bold text-xl hover:bg-blue-700 shadow-lg flex items-center justify-center gap-2 transition active:scale-95">
                        ⏭ 다음 단계
                    </button>
                </div>
            </div>
        </section>
    </main>

    <script>
        const apiKey = ""; 

        // 1. Precise Ramen Database (Based on Image Best Recipe)
        const ramenData = {
            shin: { name: "신라면", water: 550, time: 270, tip: "면 삶은 후 1분 전 계란 추천" },
            neoguri: { name: "너구리", water: 550, time: 300, tip: "면발이 굵으므로 타이밍 엄수" },
            chapaghetti: { name: "짜파게티", water: 600, time: 300, drain: true, tip: "물 8숟가락 남기고 비비기" },
            jjawang: { name: "짜왕", water: 600, time: 300, drain: true, tip: "유성스프는 마지막에" },
            anseong: { name: "안성탕면", water: 550, time: 270, tip: "구수한 국물 맛 강조" },
            buldak: { name: "불닭볶음면", water: 600, time: 300, drain: true, stir: 30, tip: "물 8스푼 남기고 30초 볶기" },
            samyang: { name: "삼양라면", water: 550, time: 240, tip: "전통적인 햄 풍미" },
            jin: { name: "진라면", water: 550, time: 240, veggieFirst: true, tip: "건더기 스프를 먼저 넣어 우려내기" },
            bibim: { name: "비빔면", water: 600, time: 180, rinse: true, tip: "찬물에 충분히 헹구기" },
            wang: { name: "왕뚜껑", water: 500, time: 210, cup: true, tip: "표시선까지 물 붓고 대기" }
        };

        // 2. Localization Strings
        const i18n = {
            "ko-KR": { start: "조리 시작", next: "다음 단계", boil: "물 끓이기", cook: "면/스프 넣기", drain: "물 버리기", stir: "소스 비비기", rinse: "찬물 헹구기", topping: "토핑 투입", finish: "조리 완료", wait: "준비 완료!", voice_guide: "지금은 {step} 단계입니다. 준비되면 시작 버튼을 눌러주세요.", alarm: "단계가 끝났습니다!" },
            "en-US": { start: "Start", next: "Next Step", boil: "Boil Water", cook: "Add Noodles", drain: "Drain Water", stir: "Mix Sauce", rinse: "Rinse Cold", topping: "Add Toppings", finish: "Finish", wait: "Ready!", voice_guide: "Step: {step}. Press start when ready.", alarm: "Time is up!" },
            "zh-CN": { start: "开始", next: "下一步", boil: "烧水", cook: "加面/调料", drain: "倒水", stir: "拌面", rinse: "冷水冲洗", topping: "加配料", finish: "完成", wait: "准备好了!", voice_guide: "当前：{step}。准备好后请按开始。", alarm: "时间到！" },
            "ja-JP": { start: "開始", next: "次へ", boil: "お湯を沸かす", cook: "麺投入", drain: "お湯を捨てる", stir: "混ぜる", rinse: "冷水で締める", topping: "トッピング", finish: "完成", wait: "準備完了!", voice_guide: "現在は{step}段階です。開始ボタンを押してください。", alarm: "終了しました！" },
            "es-ES": { start: "Empezar", next: "Siguiente", boil: "Hervir Agua", cook: "Añadir Fideos", drain: "Escurrir", stir: "Mezclar", rinse: "Enjuagar", topping: "Toppings", finish: "Listo", wait: "¡Listo!", voice_guide: "Etapa: {step}. Pulsa empezar.", alarm: "¡Tiempo!" },
            "de-DE": { start: "Start", next: "Weiter", boil: "Wasser kochen", cook: "Nudeln rein", drain: "Wasser weg", stir: "Mischen", rinse: "Abspülen", topping: "Zutaten", finish: "Fertig", wait: "Bereit!", voice_guide: "Schritt: {step}. Bitte auf Start drücken.", alarm: "Fertig!" },
            "vi-VN": { start: "Bắt đầu", next: "Tiếp theo", boil: "Đun nước", cook: "Thêm mì", drain: "Chắt nước", stir: "Trộn sốt", rinse: "Rửa nước lạnh", topping: "Thêm topping", finish: "Hoàn tất", wait: "Sẵn sàng!", voice_guide: "Giai đoạn: {step}. Nhấn bắt đầu khi sẵn sàng.", alarm: "Hết giờ!" }
        };

        // 3. State Management
        let currentSteps = [];
        let currentStepIdx = 0;
        let timer = null;
        let timeLeft = 0;
        let isRunning = false;
        let selectedLang = "ko-KR";

        // Logic Helpers
        const getT = (key) => (i18n[selectedLang] || i18n["ko-KR"])[key];

        async function speak(text) {
            // Remove emojis using regex to avoid reading them
            const cleanText = text.replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]|\uD83C[\uDF00-\uDFFF]|\uD83D[\uDC00-\uDDFF]/g, "");
            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-tts:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        contents: [{ parts: [{ text: cleanText }] }],
                        generationConfig: {
                            responseModalities: ["AUDIO"],
                            speechConfig: { voiceConfig: { prebuiltVoiceConfig: { voiceName: "Kore" } } }
                        }
                    })
                });
                const result = await response.json();
                const base64 = result.candidates[0].content.parts[0].inlineData.data;
                playPCM(base64);
            } catch (e) {
                const utterance = new SpeechSynthesisUtterance(cleanText);
                utterance.lang = selectedLang;
                window.speechSynthesis.speak(utterance);
            }
        }

        function playPCM(base64) {
            const binary = atob(base64);
            const bytes = new Uint8Array(binary.length);
            for (let i = 0; i < binary.length; i++) bytes[i] = binary.charCodeAt(i);
            const wavHeader = new Uint8Array(44);
            const view = new DataView(wavHeader.buffer);
            view.setUint32(0, 0x46464952, true); view.setUint32(4, 36 + binary.length, true);
            view.setUint32(8, 0x45564157, true); view.setUint32(12, 0x20746d66, true);
            view.setUint32(16, 16, true); view.setUint16(20, 1, true); view.setUint16(22, 1, true);
            view.setUint32(24, 24000, true); view.setUint32(28, 48000, true);
            view.setUint16(32, 2, true); view.setUint16(34, 16, true);
            view.setUint32(36, 0x61746164, true); view.setUint32(40, binary.length, true);
            const blob = new Blob([wavHeader, bytes], { type: 'audio/wav' });
            new Audio(URL.createObjectURL(blob)).play();
        }

        // Initialization Logic
        document.getElementById('ramen-select').addEventListener('change', (e) => {
            const r = ramenData[e.target.value];
            document.getElementById('ramen-info').textContent = `권장 물 ${r.water}ml, 약 ${Math.floor(r.time/60)}분 ${r.time%60}초 / ${r.tip}`;
        });

        document.getElementById('top-egg').addEventListener('change', (e) => {
            document.getElementById('egg-style').disabled = !e.target.checked;
        });

        document.getElementById('init-btn').addEventListener('click', () => {
            const rKey = document.getElementById('ramen-select').value;
            const ramen = ramenData[rKey];
            const stove = document.querySelector('input[name="stove"]:checked').value;
            selectedLang = document.getElementById('lang-select').value;
            
            currentSteps = [];
            // Step 1: Boiling
            currentSteps.push({ title: getT('boil'), duration: stove === 'gas' ? 210 : 150, icon: "🔥" });

            // Step 2: Main Cooking Phase 1
            let totalCookTime = ramen.time;
            let currentOffset = 0;

            if (ramen.veggieFirst) {
                currentSteps.push({ title: "건더기 투입 & 우려내기", duration: 30, icon: "🥬" });
                totalCookTime -= 30;
            }

            // Topping - Ricecake (Middle)
            if (document.getElementById('top-ricecake').checked) {
                currentSteps.push({ title: getT('cook'), duration: Math.floor(totalCookTime / 2), icon: "🍜" });
                currentSteps.push({ title: getT('topping') + " (떡)", duration: 30, icon: "🍡" });
                totalCookTime = totalCookTime - Math.floor(totalCookTime / 2) - 30;
            }

            // Topping - Egg (Pre-finish)
            if (document.getElementById('top-egg').checked) {
                const style = document.getElementById('egg-style').value;
                const eggTime = style === 'soft' ? 60 : 120;
                currentSteps.push({ title: getT('cook'), duration: totalCookTime - eggTime, icon: "🍜" });
                currentSteps.push({ title: getT('topping') + (style === 'soft' ? " (반숙)" : " (완숙)"), duration: eggTime, icon: "🥚" });
                totalCookTime = 0;
            }

            // Remainder if any
            if (totalCookTime > 0) {
                currentSteps.push({ title: getT('cook'), duration: totalCookTime, icon: "🍜" });
            }

            // Special Post-cooking (Drain/Stir)
            if (ramen.drain) {
                currentSteps.push({ title: getT('drain'), duration: 20, icon: "💧" });
                currentSteps.push({ title: getT('stir'), duration: ramen.stir || 30, icon: "🥢" });
            }

            if (ramen.rinse) {
                currentSteps.push({ title: getT('rinse'), duration: 40, icon: "❄️" });
                currentSteps.push({ title: getT('stir'), duration: 30, icon: "🥣" });
            }

            // Final Toppings (Onion, Cheese)
            if (document.getElementById('top-onion').checked || document.getElementById('top-cheese').checked) {
                currentSteps.push({ title: "마무리 고명 얹기", duration: 15, icon: "🧀" });
            }

            currentSteps.push({ title: getT('finish'), duration: 0, icon: "✅" });

            // Remove zero-duration steps that might have been added by logic
            currentSteps = currentSteps.filter(s => s.duration >= 0);

            startApp();
        });

        function startApp() {
            currentStepIdx = 0;
            isRunning = false;
            document.getElementById('idle-msg').classList.add('hidden');
            document.getElementById('control-bar').classList.remove('hidden');
            loadStep(0);
        }

        function renderSteps() {
            const container = document.getElementById('step-container');
            container.innerHTML = '';
            currentSteps.forEach((s, i) => {
                const div = document.createElement('div');
                div.className = `step-card p-4 rounded-xl border flex items-center gap-4 ${i === currentStepIdx ? 'active-step shadow-md border-red-300' : 'bg-white opacity-50'}`;
                div.innerHTML = `
                    <div class="w-12 h-12 flex items-center justify-center bg-white rounded-full shadow-sm text-2xl">${s.icon}</div>
                    <div class="flex-1">
                        <p class="font-bold text-gray-800">${s.title}</p>
                        <p class="text-xs text-gray-500">${s.duration > 0 ? formatTime(s.duration) : getT('finish')}</p>
                    </div>
                    ${i < currentStepIdx ? '<div class="text-green-500">✓</div>' : ''}
                `;
                container.appendChild(div);
                if (i === currentStepIdx) div.scrollIntoView({ behavior: 'smooth', block: 'center' });
            });
        }

        function loadStep(idx) {
            clearInterval(timer);
            isRunning = false;
            currentStepIdx = idx;
            timeLeft = currentSteps[idx].duration;
            
            updateTimerDisplay();
            renderSteps();
            
            const msg = getT('voice_guide').replace("{step}", currentSteps[idx].title);
            speak(msg);

            const startBtn = document.getElementById('start-btn');
            startBtn.disabled = timeLeft === 0;
            startBtn.innerHTML = `▶ ${getT('start')}`;
            startBtn.classList.replace('bg-gray-400', 'bg-green-600');
        }

        function formatTime(s) {
            const m = Math.floor(s / 60);
            const sec = s % 60;
            return `${m.toString().padStart(2, '0')}:${sec.toString().padStart(2, '0')}`;
        }

        function updateTimerDisplay() {
            document.getElementById('timer-val').textContent = formatTime(timeLeft);
        }

        document.getElementById('start-btn').addEventListener('click', () => {
            if (isRunning || timeLeft <= 0) return;
            isRunning = true;
            document.getElementById('start-btn').innerHTML = `⌛ ${getT('cook')}...`;
            document.getElementById('start-btn').classList.replace('bg-green-600', 'bg-gray-400');

            timer = setInterval(() => {
                timeLeft--;
                updateTimerDisplay();
                if (timeLeft <= 0) {
                    clearInterval(timer);
                    isRunning = false;
                    speak(getT('alarm'));
                    // Highlight the 'Next' button or auto-advance could go here, but per requirements we stay until button click
                }
            }, 1000);
        });

        document.getElementById('next-btn').addEventListener('click', () => {
            if (currentStepIdx < currentSteps.length - 1) {
                loadStep(currentStepIdx + 1);
            }
        });

    </script>
</body>
</html>
